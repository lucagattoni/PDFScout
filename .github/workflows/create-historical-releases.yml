name: Create Historical GitHub Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create git tags and GitHub Releases with correct dates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          extract_notes() {
            local VERSION="$1"
            awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md
          }

          extract_date() {
            local VERSION="$1"
            awk "/^## \[$VERSION\]/{match(\$0, /[0-9]{4}-[0-9]{2}-[0-9]{2}/); print substr(\$0, RSTART, RLENGTH); exit}" CHANGELOG.md
          }

          create_release() {
            local TAG="$1"
            local SHA="$2"
            local PRERELEASE="$3"
            local VERSION="${TAG#v}"
            local RELEASE_DATE
            RELEASE_DATE=$(extract_date "$VERSION")

            # Create and push the tag if it doesn't exist
            if ! git rev-parse "$TAG" &>/dev/null 2>&1; then
              git tag -a "$TAG" "$SHA" -m "Release $TAG"
              git push origin "$TAG"
            fi

            # Delete ALL existing releases (published + drafts) with this tag_name
            # so we can recreate with the correct published_at.
            # Use python3 to filter the full releases list (avoids jq quoting issues
            # and catches draft releases that releases/tags/{tag} doesn't return).
            gh api "repos/$GITHUB_REPOSITORY/releases" --paginate 2>/dev/null | \
              python3 -c "
import sys, json
data = json.load(sys.stdin)
for r in data:
    if r.get('tag_name') == '$TAG':
        print(r['id'])
" | while read -r EXISTING_ID; do
              gh api "repos/$GITHUB_REPOSITORY/releases/$EXISTING_ID" -X DELETE > /dev/null 2>&1 \
                && echo "Deleted release id=$EXISTING_ID for $TAG" || true
            done

            # Create the release with published_at set in the POST body.
            # GitHub honours published_at (including past dates) when set at
            # creation time. PATCH ignores past dates (it only schedules future
            # publication), and the draft→publish transition has the same limit.
            local NOTES PRERELEASE_BOOL ACTUAL_DATE
            NOTES=$(extract_notes "$VERSION")
            PRERELEASE_BOOL="false"
            if [ -n "$PRERELEASE" ]; then PRERELEASE_BOOL="true"; fi

            ACTUAL_DATE=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
              -X POST \
              -f "tag_name=$TAG" \
              -f "name=$TAG" \
              -F "draft=false" \
              -F "prerelease=$PRERELEASE_BOOL" \
              -f "published_at=${RELEASE_DATE}T00:00:00Z" \
              -f "body=$NOTES" \
              -q '.published_at')
            echo "Created $TAG → published_at=$ACTUAL_DATE (wanted $RELEASE_DATE)"
          }

          create_release "v0.1.0" "3b0e56d" "true"
          create_release "v0.2.0" "c6af2f9" "true"
          create_release "v0.3.0" "9f336de" "true"
          create_release "v1.0.0" "c7eef66" ""
          create_release "v1.1.0" "9659895" ""
          create_release "v1.1.1" "6924bd4" ""
          create_release "v1.2.0" "c5493c5" ""
          create_release "v1.3.0" "3ef1adc" ""
          create_release "v1.4.0" "4c9204a" ""
          create_release "v1.4.1" "b9d6fdf" ""
          create_release "v1.5.0" "8e1fa61" ""
          create_release "v1.5.1" "bef1db8" ""
          create_release "v1.6.0" "ef25098" ""

          echo "Done."
