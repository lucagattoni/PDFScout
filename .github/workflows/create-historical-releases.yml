name: Create Historical GitHub Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create git tags and GitHub Releases with correct dates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          extract_notes() {
            local VERSION="$1"
            awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md
          }

          extract_date() {
            local VERSION="$1"
            awk "/^## \[$VERSION\]/{match(\$0, /[0-9]{4}-[0-9]{2}-[0-9]{2}/); print substr(\$0, RSTART, RLENGTH); exit}" CHANGELOG.md
          }

          create_release() {
            local TAG="$1"
            local SHA="$2"
            local PRERELEASE="$3"
            local VERSION="${TAG#v}"
            local RELEASE_DATE
            RELEASE_DATE=$(extract_date "$VERSION")

            # Create and push the tag if it doesn't exist
            if ! git rev-parse "$TAG" &>/dev/null 2>&1; then
              git tag -a "$TAG" "$SHA" -m "Release $TAG"
              git push origin "$TAG"
            fi

            # Delete existing release so we can recreate with correct published_at.
            # GitHub ignores published_at in PATCH for already-published releases;
            # it is only honoured when a draft transitions to published.
            local EXISTING_ID
            EXISTING_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" -q '.id' 2>/dev/null || true)
            if [ -n "$EXISTING_ID" ]; then
              gh api "repos/$GITHUB_REPOSITORY/releases/$EXISTING_ID" -X DELETE
              echo "Deleted existing release $TAG (id=$EXISTING_ID)"
            fi

            # Create as draft (published_at is settable on the draft→publish transition)
            NOTES=$(extract_notes "$VERSION")
            echo "$NOTES" | gh release create "$TAG" \
              --title "$TAG" \
              --notes-file - \
              --draft \
              ${PRERELEASE:+--prerelease}

            # Locate the draft release ID (list all releases, drafts included)
            local RELEASE_ID
            RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
              --jq ".[] | select(.tag_name == \"$TAG\") | .id")

            # Publish with the correct historical date in a single PATCH
            gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
              -X PATCH \
              -F "draft=false" \
              -f "published_at=${RELEASE_DATE}T00:00:00Z"
            echo "Published $TAG → $RELEASE_DATE"
          }

          create_release "v0.1.0" "3b0e56d" "true"
          create_release "v0.2.0" "c6af2f9" "true"
          create_release "v0.3.0" "9f336de" "true"
          create_release "v1.0.0" "c7eef66" ""
          create_release "v1.1.0" "9659895" ""
          create_release "v1.1.1" "6924bd4" ""
          create_release "v1.2.0" "c5493c5" ""
          create_release "v1.3.0" "3ef1adc" ""
          create_release "v1.4.0" "4c9204a" ""
          create_release "v1.4.1" "b9d6fdf" ""
          create_release "v1.5.0" "8e1fa61" ""
          create_release "v1.5.1" "bef1db8" ""
          create_release "v1.6.0" "ef25098" ""

          echo "Done."
